name: Fetch Daily News

on:
  # 每天 UTC 23:00 = 台灣時間 07:00
  schedule:
    - cron: '0 23 * * *'
  # 也可手動在 GitHub Actions 頁面點「Run workflow」
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch RSS news
        run: npm run fetch

      - name: Commit and push updated news
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git diff --staged --quiet || git commit -m "chore: update news $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')"
          git push
