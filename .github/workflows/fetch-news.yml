name: Fetch Daily News

on:
  # 每天兩次：UTC 00:00 = 加州 17:00 PDT，UTC 12:00 = 加州 05:00 PDT
  # 冬令時（PST）會差 1 小時（16:00 & 04:00）
  schedule:
    - cron: '0 0,12 * * *'
  # 也可手動在 GitHub Actions 頁面點「Run workflow」
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm install

      - name: Fetch RSS news
        run: npm run fetch

      - name: Fetch stock prices
        run: npm run fetch:stocks

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/stocks.json
          git diff --staged --quiet || git commit -m "chore: update news & stocks $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')"
          git push
